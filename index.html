<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Untappd Beer Finder</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.5.3/papaparse.min.js"></script>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>Untappd Beer Finder</h1>
      <p>
        Upload your Untappd CSV, paste a beer shop URL, and see which beers from that page
        you have not tasted yet.
      </p>
    </section>

    <section class="panel">
      <label class="field">
        <span>1. Untappd CSV export</span>
        <input id="csvFile" type="file" accept=".csv,text/csv" />
      </label>

      <label class="field">
        <span>2. Beer shop / product listing URL</span>
        <input id="shopUrl" type="url" placeholder="https://example.com/beers" />
      </label>

      <button id="compareBtn">Compare beers</button>

      <p id="status" class="status">Ready.</p>
    </section>

    <section class="stats" id="stats" hidden>
      <div><strong id="ratedCount">0</strong><span>rated beers in CSV</span></div>
      <div><strong id="shopCount">0</strong><span>beers found on site</span></div>
      <div><strong id="missingCount">0</strong><span>not tasted yet</span></div>
    </section>

    <section class="results">
      <h2>Not tasted yet</h2>
      <div id="resultsGrid" class="grid"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
