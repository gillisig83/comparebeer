<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Untappd Beer Finder</title>

  <link rel="stylesheet" href="styles.css" />

  <!-- CSV parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>
  <main class="page">
    <section class="hero">
      <h1>Untappd Beer Finder</h1>
      <p>
        Upload your Untappd CSV, paste a beer shop URL, and see which beers from
        that page you have not tasted yet.
      </p>
    </section>

    <section class="card">
      <label class="field">
        <span>1. Untappd CSV export</span>
        <input id="csvFile" type="file" accept=".csv,text/csv" />
      </label>

      <label class="field">
        <span>2. Beer shop / product listing URL</span>
        <input
          id="shopUrl"
          type="url"
          placeholder="https://www.vinbudin.is/heim/vorur/..."
        />
      </label>

      <button id="compareBtn" type="button">
        Compare beers
      </button>

      <p id="status" class="status"></p>
      <p id="error" class="error"></p>
    </section>

    <section class="stats">
      <div class="stat">
        <strong id="ratedCount">0</strong>
        <span>rated beers in CSV</span>
      </div>

      <div class="stat">
        <strong id="siteCount">0</strong>
        <span>beers found on site</span>
      </div>

      <div class="stat">
        <strong id="notTastedCount">0</strong>
        <span>not tasted yet</span>
      </div>
    </section>

    <section class="results-section">
      <h2>Not tasted yet</h2>
      <div id="results" class="results"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
